<!DOCTYPE html>
<html>
<head>
    <title>Games</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 50px;
        }

        .game {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
        }

        a {
            color: white;
            text-decoration: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h1>Games Hub</h1>

<div class="game">
    <h2>Number Guess Game</h2>
    <button onclick="playGame()">Play</button>
</div>

<br>
<a href="index.html">Back Home</a>

<script>
function playGame() {
    let number = Math.floor(Math.random() * 10) + 1;
    let guess = prompt("Guess a number between 1 and 10");

    if (guess == number) {
        alert("You Win!");
    } else {
        alert("You Lose! Number was " + number);
    }
}
</script>

</body>
</html>
