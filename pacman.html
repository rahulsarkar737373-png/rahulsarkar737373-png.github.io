<!DOCTYPE html>
<html>
<head>
<title>Pacman</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}
canvas{
background:#000;
margin-top:20px;
border:2px solid white;
}
.controls button{
padding:15px;
margin:5px;
font-size:18px;
}
</style>
</head>
<body>

<h1>Pacman</h1>
<p>Eat dots and avoid the ghost!</p>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
<br>
<button onclick="move('up')">↑</button><br>
<button onclick="move('left')">←</button>
<button onclick="move('down')">↓</button>
<button onclick="move('right')">→</button>
</div>

<br>
<a href="games.html">Back</a>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;

let pacman = {x:20, y:20, dx:0, dy:0};
let ghost = {x:360, y:360};

let dots = [];
for(let i=20;i<380;i+=40){
for(let j=20;j<380;j+=40){
dots.push({x:i,y:j});
}
}

function draw(){
ctx.clearRect(0,0,400,400);

// draw dots
ctx.fillStyle="white";
dots.forEach(d=>{
ctx.fillRect(d.x,d.y,5,5);
});

// draw pacman
ctx.beginPath();
ctx.arc(pacman.x,pacman.y,15,0.2*Math.PI,1.8*Math.PI);
ctx.lineTo(pacman.x,pacman.y);
ctx.fillStyle="yellow";
ctx.fill();

// draw ghost
ctx.fillStyle="red";
ctx.fillRect(ghost.x-10,ghost.y-10,20,20);

// move pacman
pacman.x += pacman.dx;
pacman.y += pacman.dy;

// ghost chasing pacman
if(ghost.x < pacman.x) ghost.x += 1;
if(ghost.x > pacman.x) ghost.x -= 1;
if(ghost.y < pacman.y) ghost.y += 1;
if(ghost.y > pacman.y) ghost.y -= 1;

// eat dots
dots = dots.filter(d=>{
let dist = Math.hypot(pacman.x-d.x, pacman.y-d.y);
if(dist < 15){
score++;
document.getElementById("score").innerText = score;
return false;
}
return true;
});

// ghost catch
let gdist = Math.hypot(pacman.x-ghost.x, pacman.y-ghost.y);
if(gdist < 20){
alert("Game Over! Score: "+score);
location.reload();
}
}

setInterval(draw,30);

function move(dir){
if(dir=="up"){pacman.dx=0; pacman.dy=-2;}
if(dir=="down"){pacman.dx=0; pacman.dy=2;}
if(dir=="left"){pacman.dx=-2; pacman.dy=0;}
if(dir=="right"){pacman.dx=2; pacman.dy=0;}
}

document.addEventListener("keydown", function(e){
if(e.key=="ArrowUp") move("up");
if(e.key=="ArrowDown") move("down");
if(e.key=="ArrowLeft") move("left");
if(e.key=="ArrowRight") move("right");
});
</script>

</body>
</html>
