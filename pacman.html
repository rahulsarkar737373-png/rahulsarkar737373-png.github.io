<!DOCTYPE html>
<html>
<head>
<title>Pacman</title>
<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}
canvas{
background:#111;
margin-top:20px;
border:2px solid white;
}
.controls button{
padding:15px;
margin:5px;
font-size:18px;
}
</style>
</head>
<body>

<h1>Pacman Game</h1>
<p>Use Arrow Keys or Buttons</p>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
<br>
<button onclick="move('up')">↑</button><br>
<button onclick="move('left')">←</button>
<button onclick="move('down')">↓</button>
<button onclick="move('right')">→</button>
</div>

<br>
<a href="games.html">Back</a>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let pacman = {x:200, y:200, dx:0, dy:0};
let food = [];

for(let i=0;i<20;i++){
food.push({
x: Math.random()*380,
y: Math.random()*380
});
}

function draw(){
ctx.clearRect(0,0,400,400);

// draw food
ctx.fillStyle="white";
food.forEach(f=>{
ctx.fillRect(f.x,f.y,5,5);
});

// draw pacman
ctx.beginPath();
ctx.arc(pacman.x,pacman.y,15,0.2*Math.PI,1.8*Math.PI);
ctx.lineTo(pacman.x,pacman.y);
ctx.fillStyle="yellow";
ctx.fill();

pacman.x += pacman.dx;
pacman.y += pacman.dy;

// eat food
food = food.filter(f=>{
return Math.hypot(pacman.x-f.x, pacman.y-f.y) > 15;
});
}

setInterval(draw,50);

function move(dir){
if(dir=="up"){pacman.dx=0; pacman.dy=-3;}
if(dir=="down"){pacman.dx=0; pacman.dy=3;}
if(dir=="left"){pacman.dx=-3; pacman.dy=0;}
if(dir=="right"){pacman.dx=3; pacman.dy=0;}
}

document.addEventListener("keydown", function(e){
if(e.key=="ArrowUp") move("up");
if(e.key=="ArrowDown") move("down");
if(e.key=="ArrowLeft") move("left");
if(e.key=="ArrowRight") move("right");
});
</script>

</body>
</html>
